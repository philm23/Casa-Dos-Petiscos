<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Terra e Mar – Casa dos Petiscos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- INTRO – Título + Imagem que roda -->
  <section class="chapter" id="intro">
    <h1 class="title">Terra e Mar</h1>
    <img src="img/banner-terra-mar.png" class="rotate-on-scroll">
  </section>

  <!-- ELEMENTO 1 – Camarão -->
  <section class="chapter" id="camarao">
    <img src="img/camarao.png" class="element">
    <p class="caption">Camarão fresco da nossa costa.</p>
  </section>

  <!-- ELEMENTO 2 – Ameijoa -->
  <section class="chapter" id="ameijoa">
    <img src="img/marisco.png" class="element">
    <p class="caption">Ameijoa apanhada no dia.</p>
  </section>

  <!-- ELEMENTO 3 – Carne -->
  <section class="chapter" id="carne">
    <img src="img/carne.png" class="element">
    <p class="caption">Carne grelhada no ponto.</p>
  </section>

  <!-- ELEMENTO 4 – Saladas / Fruta / Legumes (opcional) -->
  <section class="chapter" id="saladas">
    <img src="img/saladas.png" class="element">
    <p class="caption">Frescura que completa o prato.</p>
  </section>

  <!-- FOOTER SIMPLES -->
  <footer class="footer">
    <p>Casa dos Petiscos – Viseu</p>
  </footer>
<script>
window.addEventListener("scroll", () => {
  const img = document.querySelector(".rotate-on-scroll");
  const scrollPos = window.scrollY;
  img.style.transform = `rotate(${scrollPos / 2}deg)`;
});
</script>
<script>
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
    }
  });
}, { threshold: 0.3 });

document.querySelectorAll(".element").forEach(el => observer.observe(el));
</script>

</body>
</html>
